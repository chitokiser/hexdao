<body>
  <div class="page">
    <div id="site-header"></div>

    <div class="main-wrap">
      <div class="block-title">HEX DAO 를 이용하기 위해서는 opBNB 네트웍의</div>
      <div class="block-text">USDT를 이용해서 HEX토큰을 교환 해야 합니다.</div>
      <div class="block-text" style="margin-top:6px;">교환비율 1 USDT = 1HEX  (교환 수수료 0.25%)</div>

      <div class="hr"></div>

      <div class="big-btn-row">
        <button class="big-btn" id="btnShowUSDT">보유 USDT</button>
        <button class="big-btn" id="btnShowHEX">보유 HEX 표시</button>
      </div>

      <div class="swap-grid">
        <div class="swap-box">
          <div class="swap-top">
            <div>교환할 USDT 개수 입력</div>
            <div class="mono">USDT → HEX</div>
          </div>
          <input class="input" id="inpUsdt" placeholder="예: 0.7" inputmode="decimal"/>
          <button class="swap-btn" id="btnSwapToHex">교환 하기</button>
          <div class="swap-est" id="estHex">예상 수령 HEX: -</div>
        </div>

        <div class="swap-box">
          <div class="swap-top">
            <div>교환할 HEX 수량</div>
            <div class="mono">HEX → USDT</div>
          </div>
          <input class="input" id="inpHex" placeholder="예: 5" inputmode="decimal"/>
          <button class="swap-btn" id="btnSwapToUsdt">교환 하기</button>
          <div class="swap-est" id="estUsdt">예상 수령 USDT: -</div>
        </div>
      </div>

      <div class="status" id="status">상태: 대기</div>

      <div class="family-title">HEX DAO 탈중앙화 패밀리</div>
      <div class="family-grid">
   

        <a class="family-btn" href="https://butdao.netlify.app/">

        </a>
        
        <a class="family-btn" href="https://vetdao.netlify.app/">

        </a>
  
             <a class="family-btn" href="https://pawdao.netlify.app/">

        </a>

        <a class="family-btn" href="https://expdao.netlify.app/">
          <img src="/assets/images/tokens/exp.png" alt="EXP" />
          <span>모의투자</span>
        </a>
        <a class="family-btn" href="https://monkeytree.netlify.app/">
          <img src="/assets/images/tokens/mkt.png" alt="EXP" />
          <span>돈나무</span>
        </a>

        <a class="family-btn" href="https://jump22.netlify.app/">
          <img src="/assets/images/tokens/jump.png" alt="JUMP" />
          <span>JUMP</span>
        </a>



      </div>
  


      <div class="family-title">HEX 관련 사이트</div>
      <div class="family-grid">
        <a class="family-btn" href="https://pancakeswap.finance/liquidity/pools?chain=bsc&network=8000001001&network=56&network=1&network=324&network=42161&network=59144&network=8453&network=204&network=143&search=0x3e31344335C77dA37cb2Cf409117e1dCa5Fda634" target="_blank" rel="noopener">

        </a>
        <a class="family-btn" href="https://opbnbscan.com/" target="_blank" rel="noopener">

        <a class="family-btn" href="https://opbnb-bridge.bnbchain.org/deposit" target="_blank" rel="noopener">
