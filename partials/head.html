<!-- /partials/head.html -->
<header
  class="top-header"
  style="
    padding:18px 18px 12px 18px;
    background:rgba(255,255,255,.75);
    border:1px solid rgba(15,23,42,.10);
    border-radius:18px;
    box-shadow:0 10px 30px rgba(15,23,42,.08);
    backdrop-filter:saturate(140%) blur(10px);
  "
>
  <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
    <div style="flex:1; min-width:0;">
      <!-- 로고 + (데스크탑) 메뉴 + (모바일) 햄버거 -->
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div style="display:flex; align-items:center; gap:18px; min-width:0;">
          <a href="index.html" style="display:inline-flex; align-items:center;">
            <img
              src="/assets/images/hexlogo.png"
              alt="HEX DAO"
              style="height:34px; display:block;"
            />
          </a>

          <!-- 데스크탑 네비 -->
          <nav
            id="topNavDesktop"
            style="
              display:flex;
              gap:10px;
              font-size:clamp(13px, 2.2vw, 15px);
              color:rgba(15,23,42,.72);
              align-items:center;
            "
          >
            <a
              href="swap.html"
              style="
                text-decoration:none;
                color:inherit;
                padding:8px 10px;
                border-radius:12px;
                transition:all .18s ease;
              "
              onmouseover="this.style.background='rgba(15,23,42,.05)'; this.style.color='rgba(15,23,42,.92)'"
              onmouseout="this.style.background='transparent'; this.style.color='inherit'"
            >토큰거래소</a>

            <a
              href="treasury.html"
              style="
                text-decoration:none;
                color:inherit;
                padding:8px 10px;
                border-radius:12px;
                transition:all .18s ease;
              "
              onmouseover="this.style.background='rgba(15,23,42,.05)'; this.style.color='rgba(15,23,42,.92)'"
              onmouseout="this.style.background='transparent'; this.style.color='inherit'"
            >토큰금고</a>
          </nav>
        </div>

        <!-- 모바일 햄버거 버튼 -->
        <button
          id="hamburgerBtn"
          aria-label="메뉴 열기"
          aria-expanded="false"
          style="
            display:none;
            width:42px;
            height:42px;
            border:1px solid rgba(15,23,42,.12);
            background:rgba(255,255,255,.90);
            border-radius:14px;
            cursor:pointer;
            line-height:0;
            box-shadow:0 10px 22px rgba(15,23,42,.08);
          "
        >
          <span style="display:inline-block; width:20px; height:16px; position:relative;">
            <i style="position:absolute; left:0; top:0; width:100%; height:2px; background:rgba(15,23,42,.82); border-radius:2px;"></i>
            <i style="position:absolute; left:0; top:7px; width:100%; height:2px; background:rgba(15,23,42,.82); border-radius:2px;"></i>
            <i style="position:absolute; left:0; top:14px; width:100%; height:2px; background:rgba(15,23,42,.82); border-radius:2px;"></i>
          </span>
        </button>
      </div>

      <!-- 상태 텍스트 (지갑/온체인 표시) -->
      <div
        id="headerStatusText"
        style="
          margin-top:10px;
          font-size:clamp(12px, 2vw, 13px);
          color:rgba(15,23,42,.82);
          border:1px solid rgba(15,23,42,.10);
          background:rgba(255,255,255,.88);
          border-radius:14px;
          padding:10px 12px;
          line-height:1.25;
        "
      >
        HEX DAO현황
      </div>

      <!-- 모바일 드롭다운 메뉴 -->
      <div
        id="topNavMobile"
        style="
          display:none;
          margin-top:10px;
          border:1px solid rgba(15,23,42,.10);
          border-radius:16px;
          background:rgba(255,255,255,.92);
          overflow:hidden;
          box-shadow:0 12px 26px rgba(15,23,42,.06);
        "
      >
        <a
          href="swap.html"
          style="
            display:block;
            padding:12px 12px;
            color:rgba(15,23,42,.86);
            text-decoration:none;
            border-bottom:1px solid rgba(15,23,42,.08);
          "
        >토큰거래소</a>

        <a
          href="treasury.html"
          style="
            display:block;
            padding:12px 12px;
            color:rgba(15,23,42,.86);
            text-decoration:none;
          "
        >토큰금고</a>
      </div>
    </div>

    <!-- 지갑 연결 버튼 영역 -->
    <div style="display:flex; gap:8px; align-items:center; flex-shrink:0;">
      <!-- MetaMask / Rabby 개인 지갑 -->
      <button
        id="btnConnect"
        style="
          border:1px solid rgba(43,87,255,.35);
          color:rgba(15,23,42,.92);
          background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.75));
          border-radius:999px;
          padding:10px 14px;
          cursor:pointer;
          font-size:clamp(13px, 2.2vw, 14px);
          white-space:nowrap;
          box-shadow:0 10px 24px rgba(43,87,255,.10);
          transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
        "
        onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 14px 34px rgba(43,87,255,.14)'; this.style.borderColor='rgba(43,87,255,.55)'"
        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 24px rgba(43,87,255,.10)'; this.style.borderColor='rgba(43,87,255,.35)'"
      >
        지갑연결
      </button>

      <!-- Google 로그인 (Jump 수탁 지갑) -->
      <button
        id="btnGoogleLogin"
        style="
          border:1px solid rgba(234,67,53,.35);
          color:rgba(15,23,42,.92);
          background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.75));
          border-radius:999px;
          padding:10px 14px;
          cursor:pointer;
          font-size:clamp(13px, 2.2vw, 14px);
          white-space:nowrap;
          box-shadow:0 10px 24px rgba(234,67,53,.10);
          transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
          display:flex; align-items:center; gap:6px;
        "
        onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 14px 34px rgba(234,67,53,.14)'; this.style.borderColor='rgba(234,67,53,.55)'"
        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 24px rgba(234,67,53,.10)'; this.style.borderColor='rgba(234,67,53,.35)'"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" style="flex-shrink:0;">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        구글 로그인
      </button>
    </div>
  </div>

  <!-- 상단 KPI 카드 -->
  <div
    id="top-cards"
    style="
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(5, minmax(0,1fr));
      gap:12px;
    "
  >
    <div
      style="
        border:1px solid rgba(15,23,42,.10);
        border-radius:18px;
        padding:14px 14px;
        background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
        box-shadow:0 12px 28px rgba(15,23,42,.06);
        min-height:82px;
      "
    >
      <div style="font-size:12px; color:rgba(15,23,42,.75); letter-spacing:.2px;">스테이킹 총량</div>
      <div id="hxUsers" class="onchain" style="margin-top:10px; font-size:16px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">-</div>
    </div>

    <div
      style="
        border:1px solid rgba(15,23,42,.10);
        border-radius:18px;
        padding:14px 14px;
        background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
        box-shadow:0 12px 28px rgba(15,23,42,.06);
        min-height:82px;
      "
    >
      <div style="font-size:12px; color:rgba(15,23,42,.75); letter-spacing:.2px;">HUT 가격</div>
      <div id="hutPriceTop" class="onchain" style="margin-top:10px; font-size:16px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">-</div>
    </div>

    <div
      style="
        border:1px solid rgba(15,23,42,.10);
        border-radius:18px;
        padding:14px 14px;
        background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
        box-shadow:0 12px 28px rgba(15,23,42,.06);
        min-height:82px;
      "
    >
      <div style="font-size:12px; color:rgba(15,23,42,.75); letter-spacing:.2px;">TVL</div>
      <div id="tvlTop" class="onchain" style="margin-top:10px; font-size:16px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">-</div>
    </div>

    <div
      style="
        border:1px solid rgba(15,23,42,.10);
        border-radius:18px;
        padding:14px 14px;
        background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
        box-shadow:0 12px 28px rgba(15,23,42,.06);
        min-height:82px;
      "
    >
      <div style="font-size:12px; color:rgba(15,23,42,.75); letter-spacing:.2px;">수수료 수익</div>
      <div id="feeTop" class="onchain" style="margin-top:10px; font-size:16px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">-</div>
    </div>

    <div
      style="
        border:1px solid rgba(15,23,42,.10);
        border-radius:18px;
        padding:14px 14px;
        background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
        box-shadow:0 12px 28px rgba(15,23,42,.06);
        min-height:82px;
      "
    >
      <div style="font-size:12px; color:rgba(15,23,42,.75); letter-spacing:.2px;">Vault USDT 잔고</div>
      <div id="vaultUsdtTop" class="onchain" style="margin-top:10px; font-size:16px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">-</div>
    </div>
  </div>

  <style>
    @media (max-width: 980px) {
      #top-cards {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }
    }

    @media (max-width: 420px) {
      .top-header { padding: 14px 14px 10px 14px !important; }
      #top-cards { gap: 10px !important; }
      #top-cards > div { padding: 12px !important; }
    }

    @media (max-width: 700px) {
      #topNavDesktop { display: none !important; }
      #hamburgerBtn { display: inline-flex !important; align-items:center; justify-content:center; }
    }
  </style>


</header>
